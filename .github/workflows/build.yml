name: build
on:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            FIREWORKS_API_KEY=${{ secrets.FIREWORKS_API_KEY }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/amd-track2-captioner:latest
            ghcr.io/${{ github.repository_owner }}/amd-track2-captioner:v${{ github.run_number }}
